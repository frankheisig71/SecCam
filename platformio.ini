[env:esp32-s3-cam-edge-impulse-capture]
platform = espressif32 @ 6.13.0
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
board_build.sdkconfig_path = sdkconfig.esp32-s3-cam-edge-impulse-capture
board_build.partitions = partitions_16mb_singleapp.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 11468800
board_upload.speed = 921600
