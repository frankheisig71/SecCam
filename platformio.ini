; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-cam-detect]
platform = espressif32 @ 6.13.0
board = esp32-s3-devkitc-1
framework = espidf
extra_scripts = post:scripts/flash_pedestrian_model.py
monitor_speed = 115200
board_build.sdkconfig_path = sdkconfig.esp32-s3-cam-detect
board_build.partitions = partitions_16mb_singleapp.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 11468800
board_upload.speed = 921600
board_build.psram_type = opi
custom_model_partition = pedestrian_det
custom_model_component_dir = espressif__pedestrian_detect
custom_model_glob = models/s3/*.espdl

[env:esp32-s3-cam-detect-coco320]
platform = espressif32 @ 6.13.0
board = esp32-s3-devkitc-1
framework = espidf
extra_scripts = post:scripts/flash_pedestrian_model.py
monitor_speed = 115200
board_build.sdkconfig_path = sdkconfig.esp32-s3-cam-detect-coco320
board_build.partitions = partitions_16mb_coco_singleapp.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 11468800
board_upload.speed = 921600
board_build.psram_type = opi
build_flags =
	-DAPP_PERSON_DETECT_BACKEND=APP_PERSON_DETECT_BACKEND_COCO_320
	-DAPP_CAPTURE_ON_STARTUP=0
	-DAPP_CAPTURE_TRIGGER_BURST_COUNT=1
custom_model_partition = coco_det
custom_model_component_dir = espressif__coco_detect
custom_model_glob = models/s3/coco_detect_yolo11n_320_s8_v1.espdl

